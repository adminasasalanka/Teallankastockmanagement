<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teal Lanka - Mobile Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 12px; background-color: #f1f3f5; color: #212529; }
        .top-nav { display: flex; overflow-x: auto; gap: 8px; margin-bottom: 15px; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .nav-btn { text-decoration: none; padding: 10px 14px; border-radius: 6px; font-weight: bold; font-size: 13px; white-space: nowrap; }
        .nav-btn.green-btn { background: #00875a; color: white; }
        .nav-btn.blue-btn { background: #007bff; color: white; }
        .container { max-width: 00px; margin: 0 auto; }
        .header-section { text-align: center; margin-bottom: 15px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .header-section h2 { margin: 0 0 10px 0; font-size: 18px; }
        .controls-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .controls-row input[type="month"] { width: 130px; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        .controls-row input[type="text"] { flex: 1; padding: 8px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        #mobileCardsContainer { display: flex; flex-direction: column; gap: 12px; }
        .plant-card { background: white; border-radius: 8px; padding: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 4px solid #00875a; }
        .card-row-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .plant-identity h3 { margin: 0 0 2px 0; font-size: 16px; color: #007bff; }
        .plant-identity span { font-size: 12px; color: #666; font-weight: 500; }
        .balance-badge { text-align: right; padding: 4px 8px; border-radius: 4px; font-weight: bold; font-size: 14px; }
        .badge-ok { background: #e6f4ea; color: #137333; }
        .badge-over { background: #fce8e6; color: #c5221f; }
        .balance-badge small { display: block; font-size: 9px; font-weight: normal; color: #666; text-transform: uppercase; }
        .card-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px; }
        .grid-box { background: #f8f9fa; padding: 8px; border-radius: 6px; border: 1px solid #dee2e6; }
        .grid-box .title { font-size: 11px; font-weight: bold; margin-bottom: 4px; text-transform: uppercase; }
        .grid-box .values { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 2px; }
        .val-total { border-top: 1px dashed #ccc; margin-top: 4px; padding-top: 4px; font-weight: bold; }
        .company-list { font-size: 11px; color: #555; background: #e9ecef; padding: 6px; border-radius: 4px; margin-top: 5px; }
        #loadingText { text-align: center; font-size: 14px; color: #666; padding: 20px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <a href="index.html" class="nav-btn green-btn">Dashboard</a>
        <a href="add-order.html" class="nav-btn blue-btn">Add Order</a>
        <a href="orders-list.html" class="nav-btn blue-btn">Active Orders</a>
        <a href="shipped-history.html" class="nav-btn blue-btn">Shipped History</a>
    </div>

    <div class="container">
        <div class="header-section">
            <h2>Rolling Stock Summary</h2>
            <div class="controls-row">
                <input type="month" id="reportMonth">
                <input type="text" id="searchBox" placeholder="Search code/variety...">
            </div>
        </div>

        <div id="mobileCardsContainer">
            <div id="loadingText">Recalculating rolling stock...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-auth.js";

        const prodConfig = { apiKey: "AIzaSyBRLKdJqdC4kwT4qPvHBPjf1vX2viSBxqg", authDomain: "teal-lanka-daily-production.firebaseapp.com", projectId: "teal-lanka-daily-production" };
        const stockConfig = { apiKey: "AIzaSyCNsHcWA8LYxK9d2kXYupfHoQfO0j0IOIc", authDomain: "stock-management-b898e.firebaseapp.com", projectId: "stock-management-b898e" };
        
        const prodApp = initializeApp(prodConfig, "prodApp");
        const stockApp = initializeApp(stockConfig, "stockApp");

        const dbProd = getFirestore(prodApp);
        const dbStock = getFirestore(stockApp);
        
        const authProd = getAuth(prodApp);
        const authStock = getAuth(stockApp);

        document.getElementById('reportMonth').value = new Date().toISOString().substring(0, 7);
        document.getElementById('reportMonth').addEventListener('change', generateMobileReport);
        document.getElementById('searchBox').addEventListener('input', filterCards);

        // 🔐 Security Sign-in
        async function startSecureSession() {
            try {
                await signInAnonymously(authProd);
                await signInAnonymously(authStock);
                generateMobileReport();
            } catch (err) {
                console.error(err);
                document.getElementById('mobileCardsContainer').innerHTML = `<div id="loadingText" style="color:red;">🔒 Security Connection Error.</div>`;
            }
        }

        function filterCards() {
            const query = document.getElementById('searchBox').value.trim().toUpperCase();
            const cards = document.querySelectorAll('.plant-card');
            cards.forEach(card => {
                const codeText = card.getAttribute('data-code') || "";
                const varietyText = card.getAttribute('data-variety') || "";
                if (codeText.includes(query) || varietyText.includes(query)) card.style.display = "block";
                else card.style.display = "none";
            });
        }

        async function generateMobileReport() {
            const container = document.getElementById('mobileCardsContainer');
            container.innerHTML = `<div id="loadingText">Recalculating rolling stock...</div>`;
            const selectedMonth = document.getElementById('reportMonth').value;
            try {
                const ordersSnapshot = await getDocs(collection(dbStock, "orders"));
                const prodSnapshot = await getDocs(collection(dbProd, "Production_Records"));
                let allOrders = [], allProdRecords = [], summaryMap = {}, ordersMap = {};
                ordersSnapshot.forEach(doc => allOrders.push(doc.data()));
                prodSnapshot.forEach(doc => allProdRecords.push(doc.data()));

                allProdRecords.forEach(r => {
                    const code = r.plantCode ? r.plantCode.trim().toUpperCase() : null;
                    if (code && !summaryMap[code]) summaryMap[code] = { variety: r.variety || "Unknown", multy: 0, rooting: 0, cap1st: 0, cap2nd: 0 };
                });
                allOrders.forEach(o => {
                    const code = o.plantCode ? o.plantCode.trim().toUpperCase() : null;
                    if (code && !summaryMap[code]) summaryMap[code] = { variety: o.variety || "Ordered Only", multy: 0, rooting: 0, cap1st: 0, cap2nd: 0 };
                    if (code && !ordersMap[code]) ordersMap[code] = { '1st-15th': { qty: 0, companies: [] }, '16th-End': { qty: 0, companies: [] } };
                });

                Object.keys(summaryMap).forEach(code => {
                    let totalMatureStockUpToNow = 0, totalOrdersShippedUpToNow = 0, newMatureCap1st = 0, newMatureCap2nd = 0;
                    allOrders.forEach(o => {
                        if (o.plantCode && o.plantCode.trim().toUpperCase() === code && o.status === "Shipped" && o.orderMonth < selectedMonth) {
                            totalOrdersShippedUpToNow += parseInt(o.orderedQty || 0);
                        }
                    });
                    allProdRecords.forEach(r => {
                        if (r.plantCode && r.plantCode.trim().toUpperCase() === code && r.date) {
                            let inputDate = new Date(r.date);
                            inputDate.setDate(inputDate.getDate() + 30);
                            let matureMonthStr = inputDate.toISOString().substring(0, 7);
                            let matureDay = inputDate.getDate();
                            if (matureMonthStr < selectedMonth) totalMatureStockUpToNow += parseInt(r.rooting || 0);
                            else if (matureMonthStr === selectedMonth) {
                                if (matureDay <= 15) newMatureCap1st += parseInt(r.rooting || 0); else newMatureCap2nd += parseInt(r.rooting || 0);
                            }
                        }
                        if (r.plantCode && r.plantCode.trim().toUpperCase() === code && r.date && r.date.startsWith(selectedMonth)) {
                            summaryMap[code].multy += parseInt(r.multy || 0);
                            summaryMap[code].rooting += parseInt(r.rooting || 0);
                        }
                    });
                    let rolloverStock = Math.max(0, totalMatureStockUpToNow - totalOrdersShippedUpToNow);
                    summaryMap[code].cap1st = rolloverStock + newMatureCap1st;
                    summaryMap[code].cap2nd = newMatureCap2nd;
                });

                allOrders.forEach(o => {
                    if (o.orderMonth === selectedMonth && o.status === "Pending") {
                        const code = o.plantCode ? o.plantCode.trim().toUpperCase() : "UNKNOWN";
                        const delivery = o.deliveryPeriod;
                        if (ordersMap[code] && ordersMap[code][delivery]) {
                            ordersMap[code][delivery].qty += o.orderedQty;
                            if (!ordersMap[code][delivery].companies.includes(o.companyName)) ordersMap[code][delivery].companies.push(o.companyName);
                        }
                    }
                });

                const sortedCodes = Object.keys(summaryMap).sort();
                container.innerHTML = "";
                if (sortedCodes.length === 0) { container.innerHTML = `<div id="loadingText">No records found.</div>`; return; }

                sortedCodes.forEach(code => {
                    const plant = summaryMap[code];
                    const ord1st = ordersMap[code] ? ordersMap[code]['1st-15th'] : { qty: 0, companies: [] };
                    const ord2nd = ordersMap[code] ? ordersMap[code]['16th-End'] : { qty: 0, companies: [] };
                    const totalCapacity = plant.cap1st + plant.cap2nd;
                    const totalOrdered = ord1st.qty + ord2nd.qty;
                    const netRemaining = totalCapacity - totalOrdered;
                    let allCompanies = [...new Set([...ord1st.companies, ...ord2nd.companies])].join(", ");

                    container.innerHTML += `
                        <div class="plant-card" data-code="${code}" data-variety="${plant.variety.toUpperCase()}">
                            <div class="card-row-top">
                                <div class="plant-identity"><h3>${code}</h3><span>${plant.variety}</span></div>
                                <div class="balance-badge ${netRemaining < 0 ? 'badge-over' : 'badge-ok'}"><small>Remaining</small>${netRemaining.toLocaleString()}</div>
                            </div>
                            <div class="card-grid">
                                <div class="grid-box">
                                    <div class="title" style="color:#00875a;">Available Capacity</div>
                                    <div class="values"><span>1-15:</span> <span>${plant.cap1st.toLocaleString()}</span></div>
                                    <div class="values"><span>16-End:</span> <span>${plant.cap2nd.toLocaleString()}</span></div>
                                    <div class="values val-total" style="color:#00875a;"><span>Total:</span> <span>${totalCapacity.toLocaleString()}</span></div>
                                </div>
                                <div class="grid-box">
                                    <div class="title" style="color:#dee2e6;">Total Ordered</div>
                                    <div class="values"><span>1-15:</span> <span>${ord1st.qty.toLocaleString()}</span></div>
                                    <div class="values"><span>16-End:</span> <span>${ord2nd.qty.toLocaleString()}</span></div>
                                    <div class="values val-total" style="color:#b01a1a;"><span>Total:</span> <span>${totalOrdered.toLocaleString()}</span></div>
                                </div>
                            </div>
                            <div class="card-grid" style="grid-template-columns: 1fr 1fr; margin-bottom: 10px;">
                                <div style="font-size:11px; background:#f1f3f5; padding:6px; border-radius:4px;">Multy: <strong style="color:#00875a;">${plant.multy}</strong></div>
                                <div style="font-size:11px; background:#f1f3f5; padding:6px; border-radius:4px;">Rooting: <strong style="color:#007bff;">${plant.rooting}</strong></div>
                            </div>
                            ${allCompanies ? `<div class="company-list"><strong>Companies:</strong> ${allCompanies}</div>` : ''}
                        </div>`;
                });
                filterCards(); 
            } catch (err) { console.error(err); container.innerHTML = `<div id="loadingText" style="color:red;">Error loading records.</div>`; }
        }

        startSecureSession();
    </script>
</body>
</html>
