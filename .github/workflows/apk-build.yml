name: Build HTML to APK with Custom Icon

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'zulu'

    - name: Install Cordova
      run: npm install -g cordova

    - name: Create Cordova Project
      run: |
        # 1. මුලින්ම Cordova project එක වෙනම ෆෝල්ඩරයක හදනවා
        cordova create stockapp com.stockapp.teallanka TealLankaStock
        
        # 2. Android platform එක එකතු කරනවා
        cd stockapp
        cordova platform add android
        cd ..
        
        # 3. .github සහ stockapp හැර අනිත් හැම ෆයිල්/ෆෝල්ඩරයක්ම www එකට කොපි කරනවා
        # මේකෙන් කිසිම Loop එකක් හෝ 'project root' error එකක් එන්නේ නැහැ
        rsync -av --exclude='.github' --exclude='stockapp' --exclude='.git' ./ stockapp/www/
        
        # 4. Icon එක තිබේ නම් ඒක වෙනම කොපි කරනවා
        if [ -f "icon.png" ]; then
          mkdir -p stockapp/res
          cp icon.png stockapp/res/icon.png
        fi
        
        # 5. Config file එක හදනවා
        cd stockapp
        cat <<EOF > config.xml
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.stockapp.teallanka" version="1.0.0" xmlns="http://www.w3.org/ns/widgets" xmlns:cdv="http://cordova.apache.org/ns/1.0">
            <name>TealLanka Stock</name>
            <description>Teal Lanka Stock Management App</description>
            <author email="dev@callback.com" href="http://cordova.io">Teal Lanka Team</author>
            <content src="index.html" />
            <access origin="*" />
            <icon src="res/icon.png" />
        </widget>
        EOF

    - name: Build Android APK
      run: |
        cd stockapp
        cordova build android --device

    - name: Upload APK Package
      uses: actions/upload-artifact@v4
      with:
        name: TealLanka-Stock-APK
        path: stockapp/platforms/android/app/build/outputs/apk/debug/app-debug.apk
